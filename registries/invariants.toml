exact_statement = '''Visibility obeys system-time snapshot high sequence, selected branch ancestry for each graph-reference role, valid-time slice-set intersection and boundary normalization, create/retire and schema-coordinate rules, own-write/workspace overlays, the erasure-tombstone conjunct (§12.6), and the expiry predicate (§4.8); distinct branch heads or valid-time selectors never alias. Local/Meta applied state may advance ahead of public state only through the rooted gap-free audit visibility pipeline, and every read/result/side channel begins at its visible endpoint; a `SnapshotQuery` admission reads only the pipeline's visible candidate root and can never observe applied-hidden state. Restore/role-transition state remains unobservable while reconciliation, activation, pipeline release, service preparation, or independent reopen is pending; every request, cursor, capability, and forwarded shard operation matches the current incarnation/service epoch.'''
