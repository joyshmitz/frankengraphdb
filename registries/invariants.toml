checker_entrypoint = "fg_inv_02_core_checker"
negative_test_entrypoint = "fg_inv_02_core_negative"
model_or_proof_scope = "Ownership/reservation models and runtime oracles; escrow conservation and bounds are additionally Lean-scoped via the cited lane."
