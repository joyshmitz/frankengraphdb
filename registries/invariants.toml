# =============================================================================
# invariants.toml — the invariant registry spine (G0)
# =============================================================================
# Bead: fgdb-g0-claim-registries-myx (schema, spine IDs, activation contract)
# Bead: fgdb-g0-invariant-spine-tmm  (clause payload, materialized below)
# Provenance: plan Appendix F; §1 constraint 11; §19 Gate G0.
#
# This registry contains ONLY exact safety/liveness invariants and their
# formally scoped proof/bounded_model clauses (§1.11). Statistical claims
# live in evidence.toml; slo/benchmark/configuration-model claims live in
# slo.toml. A statistical/slo/benchmark row in this file is a build error.
#
# There are EXACTLY twenty top-level invariant IDs (FG-INV-01 … FG-INV-20).
# Each row is materialized as one or more stable subordinate clause records;
# subordinate clause keys do NOT create additional invariant IDs. The
# twenty-ID table is hash-pinned below; adding a twenty-first ID (or removing
# one) fails CI with the exact row-level diff.
#
# Clause record schema (activation contract, Appendix F preamble):
#
#   [[invariant.clause]]
#   key                      = "FG-INV-04.core"   # stable, ID-scoped
#   claim_class              = "invariant"      # invariant | proof | bounded_model
#   exact_statement          = '''...'''        # Appendix F column 2, VERBATIM
#   enforcement              = '''...'''        # Appendix F column 3, VERBATIM:
#                                               # the apparatus behind the
#                                               # checker entrypoints (optional
#                                               # once entrypoints are live)
#   activation_predicate     = "mvcc-visibility" # boolean expr over capability-
#                                               # manifest features/postures/roles
#   dependencies             = ["FG-INV-03.core"] # clause keys or FG-INV ids
#   checker_entrypoint       = "..."            # must resolve in checker_index.toml
#   negative_test_entrypoint = "..."            # must resolve in checker_index.toml
#   model_or_proof_scope     = "..."            # model scope / bounds / fairness
#   proof_lane               = "lean-..."       # REQUIRED for claim_class = proof;
#                                               # must resolve in proof_lanes.toml
#   owner                    = "fgdb-txn"       # owning crate/subsystem
#   first_gate               = "G1"             # G0 | G1 | G2 | G3 | G4
#   status                   = "stub"           # live | stub | dormant
#   waiver                   = "forbidden"      # literal; anything else fails CI
#   justified_by             = []               # optional; rank(justifier) >=
#                                               # rank(clause) or the build fails
#
# ACTIVATION DISCIPLINE (pre-Genesis): every clause below is status = "stub"
# and guarded by the capability atom of its owning feature. No capability
# manifest may enable an atom until the clause's checker is live — CI computes
# the closure and forces the capability off otherwise ("every reachable clause
# must be live; an unimplemented or dormant clause forces its feature off and
# cannot count as covered"). Workstream beads flip status stub -> live in the
# same change that lands the checker, never before.
#
# CI (tools/registry-check) verifies: the twenty-ID set and table hash, the
# clause dependency DAG (acyclic, registered targets only), checker/negative-
# test symbol existence, waiver = "forbidden" on every clause, proof-lane
# resolution, class-lattice legality of justified_by, and the compiled-plus-
# negotiated activation closure.
# =============================================================================

schema_version = 1

[registry]
name = "invariants"
allowed_claim_classes = ["invariant", "proof", "bounded_model"]
waiver_policy = "forbidden"
twenty_id_hash = "fnv1a64:204a4b17c8ecc57f"

# -----------------------------------------------------------------------------
# FG-INV-01
# -----------------------------------------------------------------------------

[[invariant]]
id = "FG-INV-01"
title = "Attempt/outcome uniqueness: at most one immutable semantic terminal outcome and final-effect digest per registered attempt; AttemptFamilyState admission discipline"

[[invariant.clause]]
key = "FG-INV-01.core"
claim_class = "invariant"
exact_statement = '''Within one database security namespace/incarnation and capability domain, each scoped begin/autocommit key, durable token, and registered attempt maps to at most one immutable semantic terminal outcome and final-effect digest; matching retries return the recorded lineage and conflicting transitions fail. Commit has exactly one marker, while Abort, NeverRegistered, and ReadClosed can never later Commit. W12 reserves the begin key and outcome-capability bytes before response. `AttemptFamilyState` admits only generation-zero `First`, exact `prior+1 Successor` after a prior **registered** attempt is Terminal and its release/overlap floor is proved, or byte-identical `IdempotentRetry`; NeverRegistered creates no family/generation/burn. At most one generation is Active or PrepareAdmitted. TerminalReady is exposed only after its exact postcondition bitmap, audit visibility, and independent result detachment are complete; detailed and compacted proofs return byte-identical public outcomes, and no shard creates or reverses the semantic decision.'''
enforcement = '''Local/Meta begin, family, token, attempt, marker, ownership, outcome, and completion CAS models; lost-response and concurrent first/successor/retry/cancel/read-close/commit tests; NeverRegistered-no-family negatives; participant, leader-loss, crash, partition, compaction, and capability-status oracles.'''
activation_predicate = "txn-lifecycle"
dependencies = []
checker_entrypoint = "fg_inv_01_core_checker"
negative_test_entrypoint = "fg_inv_01_core_negative"
model_or_proof_scope = "Runtime CAS-model oracles and concurrency test campaigns per the enforcement column; no formal lane bound to this clause."
owner = "fgdb-txn"
first_gate = "G1"
status = "stub"
waiver = "forbidden"

