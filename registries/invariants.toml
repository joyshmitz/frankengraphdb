title = "Exclusive-ownership generations: single legal live owner per exclusive unit; escrow custody partition and conservation"

[[invariant.clause]]
key = "FG-INV-02.core"
claim_class = "invariant"
exact_statement = '''For every exclusive block, constraint-owner reservation, resource hold, allocation offset, final-certification basis, and escrow custody unit, at most one legal live generation owns or may consume it; stale, cancelled, expired, or prior-configuration owners can neither mutate nor release it. Under §14.6's batch-certification law the batch-scoped `GlobalFinalCertificationReservation` is the single legal live owner of a shared certification basis and carries per-candidate sub-holds; exclusivity is per generation, not per candidate, and no candidate-level owner may coexist with a live batch owner. Escrow custody is a disjoint exhaustive partition, finite-side conservation equations hold at every transition, values remain within bounds, and only registered creation/reconfiguration/quota-epoch/branch-overlay-retirement transitions with exact before/after proof may mint or burn rights.'''
enforcement = '''Lock/reservation/ownership-transfer models; Lean escrow conservation/bounds lane; independent lock-table, generation reuse, duplicate consume, cancellation, reconfiguration, quota rollover, crash, and topology-transfer oracles.'''
activation_predicate = "exclusive-ownership"
