# =============================================================================
# checker_index.toml — resolvable checker/negative-test symbol index (G0)
# =============================================================================
# Bead: fgdb-g0-claim-registries-myx
# Provenance: plan Appendix F preamble ("resolvable enforcement and negative-
# test entrypoints"; "CI verifies ... checker/test symbol existence").
#
# Every `checker_entrypoint` and `negative_test_entrypoint` named by a clause
# in invariants.toml must resolve to a row here. Rows may be stub-registered
# pre-Genesis (status = "stub") so the g0-invariant-spine bead can bind clause
# records before their runtime oracles exist — but the symbol must still be a
# registered, reviewable row, and a "live" row's artifact must exist in-repo.
#
# Row schema:
#   [[checker]]
#   symbol   = "..."        # the exact symbol clauses cite
#   kind     = "cargo-test" | "script" | "binary" | "stub"
#   artifact = "..."        # repo-relative path implementing the symbol
#   status   = "live" | "stub"
# =============================================================================

schema_version = 1

